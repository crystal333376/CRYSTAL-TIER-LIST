<!DOCTYPE html>
<html>
<head>
<title>CRYSTAL TIER LIST</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 50px;
}

/* Title */
h1 {
    text-align: center;
    font-size: 70px;
    margin-bottom: 50px;
    text-shadow: 0 0 20px cyan;
}

/* Row layout */
.rank {
    display: grid;
    grid-template-columns: 1fr 3fr 1fr;
    align-items: center;
    margin: 15px 0;
    padding: 15px 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(5px);
    font-weight: bold;
}

/* Left number */
.number {
    font-size: 50px;
}

/* Center name */
.name {
    text-align: center;
    font-size: 45px;
}

/* Right role */
.role {
    text-align: right;
    font-size: 25px;
    opacity: 0.8;
}

/* Colors */
.rank1 .number { color: gold; text-shadow: 0 0 15px gold; }
.rank2 .number { color: deepskyblue; text-shadow: 0 0 15px deepskyblue; }
.rank3 .number { color: red; }
.rank4 .number { color: lime; }
.rank5 .number { color: white; }

/* Hover */
.rank:hover {
    transform: scale(1.03);
    transition: 0.2s;
}
</style>

</head>

<body>

<div class="container">
    <h1>⚔️ CRYSTAL PVP RANKS ⚔️</h1>

    <div class="rank rank1">
        <div class="number">#1</div>
        <div class="name">👑 Crystal Cube 6969</div>
        <div class="role">🔱 Mace & Spear</div>
    </div>

    <div class="rank rank2">
        <div class="number">#2</div>
        <div class="name">🗡️ Shiny Basfore</div>
        <div class="role">Sword</div>
    </div>

    <div class="rank rank3">
        <div class="number">#3</div>
        <div class="name">Empty</div>
        <div class="role">-</div>
    </div>

    <div class="rank rank4">
        <div class="number">#4</div>
        <div class="name">Empty</div>
        <div class="role">-</div>
    </div>

    <div class="rank rank5">
        <div class="number">#5</div>
        <div class="name">Empty</div>
        <div class="role">-</div>
    </div>

</div>

</body>
</html>
